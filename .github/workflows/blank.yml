name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Create local.properties
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        R2_MODEL_URL: ${{ secrets.R2_MODEL_URL }}
        R2_API_TOKEN: ${{ secrets.R2_API_TOKEN }}
      run: |
        echo "GEMINI_API_KEY=$GEMINI_API_KEY" > local.properties
        echo "R2_MODEL_URL=$R2_MODEL_URL" >> local.properties
        echo "R2_API_TOKEN=$R2_API_TOKEN" >> local.properties

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
